# Bharat OS — CI workflow (Phase 4.6).
#
# Runs on every push to main + every PR. Three jobs in parallel
# where possible: lint, test, build.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  packages: write   # only used by the publish job on tagged releases

jobs:
  test:
    name: Tests (Node 24)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      # No `npm ci` — Bharat OS has zero npm runtime deps. If that
      # ever changes, uncomment the next line.
      # - run: npm ci --omit=dev
      - name: Run test suite
        run: node --test --test-concurrency=1 tests/node/*.test.mjs
      - name: Run vernacular round-trip on the demo seed
        run: |
          node scripts/seed-demo.mjs .ci-demo-store
          # Quick smoke: API boots + responds on /healthz
          node bin/bos-api.mjs --store .ci-demo-store --host 127.0.0.1 --port 8787 &
          API_PID=$!
          sleep 2
          if ! curl -fsS http://127.0.0.1:8787/healthz > /dev/null; then
            kill $API_PID
            echo "::error::API failed /healthz smoke check"
            exit 1
          fi
          kill $API_PID || true
          rm -rf .ci-demo-store

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build (don't push) — verifies the Dockerfile + tests inside the build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: bharat-os:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Tagged releases (v0.1.0 etc.) get pushed to GitHub Container Registry.
  publish:
    name: Publish to GHCR
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
